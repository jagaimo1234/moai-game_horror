<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MOAI YOGURT AVOID [V1]</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent-color: #00d2ff;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            touch-action: none;
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }

        #ui-container {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 20px;
            right: 20px;
            pointer-events: none;
            z-index: 10;
        }

        #ui-text {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 14px;
            display: inline-block;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        #score-container {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            right: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: 700;
            z-index: 10;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            color: var(--accent-color);
        }

        #controls {
            position: absolute;
            bottom: env(safe-area-inset-bottom, 40px);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            pointer-events: none;
        }

        .btn-joystick {
            width: 90px;
            height: 90px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 2px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            user-select: none;
        }

        .btn-joystick:active {
            transform: scale(0.85);
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--accent-color);
        }

        #fullscreen-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 12px;
            pointer-events: auto;
            cursor: pointer;
            z-index: 20;
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(30, 30, 30, 0.9) 0%, rgba(0, 0, 0, 1) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
            transition: opacity 0.5s ease;
        }

        .start-card {
            text-align: center;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.8);
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tap-msg {
            font-size: 18px;
            opacity: 0.8;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* Retro Game Over UI Styles */
        .retro-container {
            position: relative;
            max-width: 600px; /* Adjust based on image aspect ratio if needed, keeping it responsive */
            width: 100%;
            margin: 0 auto;
        }

        .retro-bg {
            width: 100%;
            height: auto;
            display: block; /* Remove bottom space */
        }

        .retro-score {
            position: absolute;
            font-family: 'DotGothic16', sans-serif;
            color: #ff4a4a; /* Red color matching the reference */
            background-color: #2b2b2b; /* Match the dark gray background of the score box */
            padding: 0 10px; /* Expand the background width to cover "233" */
            font-size: 4.5vw; /* Slightly larger */
            top: 38.2%; /* Moved up for the new layout */
            left: 56.5%; /* Keeping same left */
            transform: translate(-50%, -50%);
            z-index: 10;
        }
        
        /* Media query roughly for the max-width to cap font size */
        @media (min-width: 600px) {
            .retro-score {
                font-size: 26px; /* Capped font size */
                top: 43.5%; /* Fine-tuned for desktop */
            }
        }

        .retro-btn {
            position: absolute;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 10;
            outline: none;
            -webkit-tap-highlight-color: transparent; /* Remove blue highlight on mobile */
            color: transparent; /* Hide text if any is added for accessibility */
        }

        
        /* Approximate hitboxes based on the image proportions */
        .btn-retry {
            top: 53.5%;
            left: 14%;
            width: 72%;
            height: 9.5%;
        }

        .btn-follow {
            top: 65%;
            left: 11%;
            width: 78%;
            height: 9.5%;
        }

        .btn-x {
            top: 75.5%;
            left: 29.5%;
            width: 15%;
            height: 12.5%;
        }

        .btn-insta {
            top: 75.5%;
            left: 54%;
            width: 15%;
            height: 12.5%;
        }

    </style>
</head>

<body>
    <div id="ui-container">
        <div id="ui-text">← → MOVE / AVOID ENEMIES</div>
    </div>
    <div id="score-container">0</div>

    <div id="start-screen" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; cursor: pointer;">
        <div style="position: relative; width: 100%; height: 100%; background-image: url('title_bg.png'); background-size: cover; background-position: center top;">
            
            <!-- Event Info & Map Button -->
            <div style="position: absolute; top: 38%; left: 5%; right: 5%; display: flex; justify-content: space-between; align-items: center; z-index: 101;">
                <div style="color: #fff; font-family: 'Outfit', sans-serif; font-weight: bold; text-shadow: 0px 2px 5px rgba(0,0,0,1);">
                    <div style="font-size: 18px; margin-bottom: 5px;">名古屋クリマ M-470</div>
                    <div style="font-size: 16px;">Kanazawa Moataro</div>
                </div>
                
                <button onclick="event.stopPropagation(); window.open('https://www.google.com/maps/search/?api=1&query=ポートメッセなごや', '_blank')" style="
                    background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.5); color: #fff; 
                    padding: 8px 16px; border-radius: 12px; font-size: 18px; font-weight: bold;
                    display: flex; align-items: center; gap: 8px; cursor: pointer; 
                    backdrop-filter: blur(4px); box-shadow: 0 4px 6px rgba(0,0,0,0.5);
                ">
                    🗺️ MAP
                </button>
            </div>

            <!-- Tap to Start -->
            <p class="tap-msg" style="
                position: absolute; top: 55%; width: 100%; text-align: center;
                font-family: 'Outfit', sans-serif; font-size: 26px; font-weight: bold; color: #fff; 
                text-shadow: 0 0 15px rgba(255,255,255,0.8), 0 0 5px #000; z-index: 101;
            ">TAP TO START</p>
        </div>
    </div>

    <div id="fullscreen-btn">FULLSCREEN</div>

    <div id="controls">
        <div id="btn-left" class="btn-joystick">←</div>
        <div id="btn-right" class="btn-joystick">→</div>
    </div>

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
    </script>
    <script type="module" src="./main.js"></script>
</body>

</html>
