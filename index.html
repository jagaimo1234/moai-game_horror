<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOAI ROBOT YOGURT AVOID</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            touch-action: none;
            /* touch-action: none for better touch handling */
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: sans-serif;
            z-index: 10;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            pointer-events: none;
            /* 下のレイヤー（Canvas）へのタッチを妨げないようにするが、ボタン自体はpointer-events: autoにする */
        }

        .btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid white;
            border-radius: 50%;
            color: white;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            pointer-events: auto;
            /* ボタンは押せるように */
            cursor: pointer;
        }

        .btn:active {
            background: rgba(255, 255, 255, 0.6);
        }

        #score {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            font-family: sans-serif;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div id="ui">← → または ボタン で移動 / ヨーグルトを避けろ</div>
    <div id="score">SCORE: 0</div>

    <div id="start-screen"
        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; display: flex; justify-content: center; align-items: center; z-index: 100; cursor: pointer;">
        <div style="text-align: center;">
            <h1>MOAI ROBOT YOGURT AVOID</h1>
            <p>CLICK TO START</p>
            <p>🎵 Music ON</p>
        </div>
    </div>

    <audio id="bgm" src="./bgm.mp3" loop></audio>

    <div id="controls">
        <div id="btn-left" class="btn">←</div>
        <div id="btn-right" class="btn">→</div>
    </div>

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
    <script type="module" src="./main.js"></script>
</body>

</html>
