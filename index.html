<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MOAI YOGURT AVOID [V1]</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent-color: #00d2ff;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            touch-action: none;
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }

        #ui-container {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 20px;
            right: 20px;
            pointer-events: none;
            z-index: 10;
        }

        #ui-text {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 14px;
            display: inline-block;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        #score-container {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            right: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: 700;
            z-index: 10;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            color: var(--accent-color);
        }

        #controls {
            position: absolute;
            bottom: env(safe-area-inset-bottom, 40px);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            pointer-events: none;
        }

        .btn-joystick {
            width: 90px;
            height: 90px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 2px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            user-select: none;
        }

        .btn-joystick:active {
            transform: scale(0.85);
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--accent-color);
        }

        #fullscreen-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 12px;
            pointer-events: auto;
            cursor: pointer;
            z-index: 20;
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(30, 30, 30, 0.9) 0%, rgba(0, 0, 0, 1) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
            transition: opacity 0.5s ease;
        }

        .start-card {
            text-align: center;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.8);
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tap-msg {
            font-size: 18px;
            opacity: 0.8;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* ===== ランキングモーダル ===== */
        #ranking-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        #ranking-modal.active { display: flex; }
        .ranking-box {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 2px solid rgba(255,215,0,0.5);
            border-radius: 20px;
            padding: 30px 24px;
            width: 90%;
            max-width: 420px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(255,215,0,0.2);
        }
        .ranking-title {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: bold;
            color: #FFD700;
            text-align: center;
            margin-bottom: 20px;
        }
        .ranking-row {
            display: flex;
            align-items: center;
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }
        .ranking-row .rank { width: 36px; font-weight: bold; color: #FFD700; }
        .ranking-row .rname { flex: 1; }
        .ranking-row .rscore { font-weight: bold; color: #00d2ff; }
        .ranking-close {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
        }

        /* 名前入力オーバーレイ */
        #name-input-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 300;
            justify-content: center;
            align-items: center;
        }
        #name-input-overlay.active { display: flex; }
        .name-input-box {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 2px solid rgba(0,210,255,0.5);
            border-radius: 20px;
            padding: 30px 24px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,210,255,0.2);
        }
        .name-input-box h2 {
            font-family: 'Outfit', sans-serif;
            color: #fff;
            font-size: 20px;
            margin-bottom: 8px;
        }
        .name-input-box .score-display {
            font-family: 'DotGothic16', sans-serif;
            color: #FFD700;
            font-size: 32px;
            margin-bottom: 16px;
        }
        .name-input-box input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 18px;
            font-family: 'Outfit', sans-serif;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 16px;
        }
        .name-input-box button {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
        }
        .btn-submit { background: #00d2ff; color: #000; margin-bottom: 10px; }
        .btn-skip { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.3) !important; }

        /* Retro Game Over UI Styles */
        .retro-container {
            position: relative;
            max-width: 600px; /* Adjust based on image aspect ratio if needed, keeping it responsive */
            width: 100%;
            margin: 0 auto;
        }

        .retro-bg {
            width: 100%;
            height: auto;
            display: block; /* Remove bottom space */
        }

        .retro-score {
            position: absolute;
            font-family: 'DotGothic16', sans-serif;
            color: #ff4a4a; /* Red color matching the reference */
            background-color: #2b2b2b; /* Match the dark gray background of the score box */
            padding: 0 10px; /* Expand the background width to cover "233" */
            font-size: 4.5vw; /* Slightly larger */
            top: 38.2%; /* Moved up for the new layout */
            left: 56.5%; /* Keeping same left */
            transform: translate(-50%, -50%);
            z-index: 10;
        }
        
        /* Media query roughly for the max-width to cap font size */
        @media (min-width: 600px) {
            .retro-score {
                font-size: 26px; /* Capped font size */
                top: 43.5%; /* Fine-tuned for desktop */
            }
        }

        .retro-btn {
            position: absolute;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 10;
            outline: none;
            -webkit-tap-highlight-color: transparent; /* Remove blue highlight on mobile */
            color: transparent; /* Hide text if any is added for accessibility */
        }

        
        /* Approximate hitboxes based on the image proportions */
        .btn-retry {
            top: 53.5%;
            left: 14%;
            width: 72%;
            height: 9.5%;
        }

        .btn-follow {
            top: 65%;
            left: 11%;
            width: 78%;
            height: 9.5%;
        }

        .btn-x {
            top: 75.5%;
            left: 29.5%;
            width: 15%;
            height: 12.5%;
        }

        .btn-insta {
            top: 75.5%;
            left: 54%;
            width: 15%;
            height: 12.5%;
        }

    </style>
</head>

<body>
    <div id="ui-container">
        <div id="ui-text">← → MOVE / AVOID ENEMIES</div>
    </div>
    <div id="score-container">0</div>

        <div style="position: relative; width: 100%; max-width: 550px;">
            <img src="title_bg.png" style="width: 100%; height: auto; display: block;" alt="襲いかかる作者(私)を避けろゲーム">
            
            <!-- ▼▼▼ イベント情報の更新はここを書き換えてください ▼▼▼ -->
            <div style="position: absolute; top: 32%; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 101;">
                
                <!-- イベント名・ブース名 -->
                <div style="text-align: center; color: #fff; font-family: 'Outfit', sans-serif; font-weight: bold; text-shadow: 0px 2px 5px rgba(0,0,0,1);">
                    <div style="font-size: clamp(16px, 4.5vw, 22px); margin-bottom: 4px;">名古屋クリマ</div>
                    <div style="font-size: clamp(14px, 4vw, 18px); margin-bottom: 4px;">ブースNo. M-470</div>
                    <div style="font-size: clamp(14px, 4vw, 18px);">ブース名 Kanazawa Moataro</div>
                </div>
                
                <!-- MAPボタン（URLをイベント会場に合わせて変更してください） -->
                <button onclick="event.stopPropagation(); window.open('booth_map.jpg', '_blank')" style="
                    background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.6); color: #fff;

            <!-- Tap to Start -->
            <p class="tap-msg" style="
                position: absolute; top: 60%; width: 100%; text-align: center; margin: 0;
                font-family: 'Outfit', sans-serif; font-size: clamp(22px, 6vw, 28px); font-weight: bold; color: #fff; 
                text-shadow: 0 0 15px rgba(255,255,255,0.8), 0 0 5px #000; z-index: 101;

            <!-- Sound recommendation -->
            <p style="

                color: #FFD700; text-shadow: 0 0 8px rgba(255,215,0,0.8), 0 0 3px #000;
                z-index: 101; letter-spacing: 0.5px;
            ">🔊 ミュート解除するとBGMがでます</p>

            <!-- Ranking Button (現在オフ) -->
            <!-- <button onclick="event.stopPropagation(); window.showRanking()" style="

                background: rgba(255,215,0,0.15); border: 2px solid rgba(255,215,0,0.7); color: #FFD700;
                padding: clamp(6px,1.5vw,8px) clamp(16px,5vw,28px); border-radius: 20px;

    </div>

    <!-- Ranking Modal -->
    <div id="ranking-modal">
        <div class="ranking-box">
            <div class="ranking-title">👑 TOP 10 RANKING</div>
            <div id="ranking-list"><p style="text-align:center;color:#aaa;">読み込み中...</p></div>
            <button class="ranking-close" onclick="document.getElementById('ranking-modal').classList.remove('active')">閉じる</button>
        </div>
    </div>

    <!-- Name Input Overlay -->
    <div id="name-input-overlay">
        <div class="name-input-box">
            <h2>🎮 スコアを登録しよう！</h2>

            <input type="text" id="player-name-input" placeholder="ニックネーム" maxlength="12">
            <button class="btn-submit" onclick="window.submitScore()">登録してリプレイ</button>

        </div>
    </div>

    <div id="fullscreen-btn">FULLSCREEN</div>

    <div id="controls">
        <div id="btn-left" class="btn-joystick">←</div>
        <div id="btn-right" class="btn-joystick">→</div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js';
      import { getDatabase, ref, push, query, orderByChild, limitToLast, get } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js';

      const firebaseConfig = {
        apiKey: "AIzaSyA8V8kmjfQ0FEE4bq3R4sBC94yLHbWfd-I",
        authDomain: "moai-horror-game-ranking.firebaseapp.com",
        databaseURL: "https://moai-horror-game-ranking-default-rtdb.firebaseio.com",
        projectId: "moai-horror-game-ranking",
        storageBucket: "moai-horror-game-ranking.firebasestorage.app",
        messagingSenderId: "889857597584",
        appId: "1:889857597584:web:5775e2b9753ddc83527815"
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      // スコアを保存する関数
      window.saveScore = async function(name, score) {
        try {
          await push(ref(db, 'scores'), { name, score, timestamp: Date.now() });
          return true;
        } catch(e) {
          console.error(e);
          return false;
        }
      };

      // ランキングを取得する関数
      window.getTopScores = async function() {
        try {
          const q = query(ref(db, 'scores'), orderByChild('score'), limitToLast(10));
          const snap = await get(q);
          const results = [];
          snap.forEach(child => results.push(child.val()));
          return results.sort((a, b) => b.score - a.score);
        } catch(e) {
          console.error(e);
          return [];
        }
      };
    </script>

    <script type="importmap">

      }
    }
    </script>
    <script type="module" src="./main.js"></script>
</body>
