<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>お品書き | Kanazawa Moataro</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=DotGothic16&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; color: #fff; font-family: 'Outfit', sans-serif; min-height: 100vh; overflow-x: hidden; }

    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.85); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
    }
    .btn-back {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; padding: 8px 18px; border-radius: 20px; font-size: 14px;
      font-family: 'Outfit', sans-serif; cursor: pointer; text-decoration: none;
      display: flex; align-items: center; gap: 6px;
    }
    .header-title { font-size: 18px; font-weight: 700; letter-spacing: 2px; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .view-toggle { display: flex; gap: 6px; }
    .toggle-btn {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.5); width: 36px; height: 36px; border-radius: 10px;
      cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .toggle-btn.active { background: rgba(0,210,255,0.2); border-color: #00d2ff; color: #00d2ff; }

    /* 管理者ボタン（隠し気味） */
    .admin-btn {
      background: transparent; border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.2); width: 32px; height: 32px; border-radius: 8px;
      cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
    }

    .page-hero { text-align: center; padding: 28px 20px 16px; }
    .page-hero h1 {
      font-size: clamp(28px, 8vw, 48px); font-weight: 900;
      background: linear-gradient(90deg, #fff 0%, #00d2ff 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 4px; margin-bottom: 4px;
    }
    .page-hero p { font-size: 14px; color: rgba(255,255,255,0.4); letter-spacing: 2px; }

    /* イベントバッジ */
    #event-badge {
      text-align: center; padding: 6px 0 12px;
    }
    .badge {
      display: inline-block; background: rgba(255,215,0,0.15);
      border: 1px solid rgba(255,215,0,0.5); color: #FFD700;
      padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: bold;
    }

    /* ===== VIEWS ===== */
    #carousel-view { display: none; }
    #tile-view { display: block; }

    .tile-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 14px; padding: 10px 16px 40px; max-width: 700px; margin: 0 auto;
    }
    .product-card-tile {
      background: linear-gradient(145deg, #141420, #1e1e2e);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 18px;
      overflow: hidden; cursor: pointer; transition: transform 0.2s;
    }
    .product-card-tile:active { transform: scale(0.97); }
    .product-card-tile img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
    .product-info-tile { padding: 12px 14px 16px; }
    .product-name-tile { font-size: clamp(12px, 3.5vw, 15px); font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
    .product-price-tile { font-size: clamp(14px, 4vw, 18px); font-weight: 900; color: #00d2ff; font-family: 'DotGothic16', sans-serif; }

    .carousel-wrapper { position: relative; overflow: hidden; }
    .carousel-track { display: flex; transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    .carousel-slide { min-width: 100%; padding: 10px 24px 30px; display: flex; justify-content: center; }
    .product-card-large {
      background: linear-gradient(145deg, #141420, #1e1e2e);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 24px;
      overflow: hidden; max-width: 500px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .product-card-large img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
    .product-info-large { padding: 20px 24px 28px; }
    .product-name-large { font-size: clamp(18px, 5vw, 24px); font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
    .product-desc { font-size: 14px; color: rgba(255,255,255,0.55); line-height: 1.6; margin-bottom: 16px; }
    .product-price-large { font-size: clamp(20px, 5vw, 28px); font-weight: 900; color: #00d2ff; font-family: 'DotGothic16', sans-serif; }

    .carousel-controls { display: flex; justify-content: center; align-items: center; gap: 16px; padding: 10px 0 24px; }
    .carousel-btn {
      width: 44px; height: 44px; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; color: #fff;
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .carousel-dots { display: flex; gap: 8px; align-items: center; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.25); cursor: pointer; transition: all 0.2s; }
    .dot.active { background: #00d2ff; width: 20px; border-radius: 4px; }
    .items-count { text-align: center; color: rgba(255,255,255,0.3); font-size: 13px; padding-bottom: 8px; }

    /* ===== 管理者モーダル ===== */
    #admin-modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); z-index: 500;
      justify-content: center; align-items: center;
    }
    #admin-modal.active { display: flex; }
    .admin-box {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 2px solid rgba(255,215,0,0.4); border-radius: 20px;
      padding: 30px 24px; width: 90%; max-width: 360px; text-align: center;
      box-shadow: 0 0 40px rgba(255,215,0,0.1);
    }
    .admin-box h2 { font-size: 20px; color: #FFD700; margin-bottom: 6px; }
    .admin-box p  { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 20px; }
    .admin-input {
      width: 100%; padding: 12px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08);
      color: #fff; font-size: 18px; font-family: 'Outfit', sans-serif;
      text-align: center; margin-bottom: 14px; letter-spacing: 4px;
    }
    .admin-btn-row { display: flex; gap: 10px; }
    .btn-admin-ok {
      flex: 1; padding: 12px; border-radius: 12px; border: none;
      background: #FFD700; color: #000; font-size: 16px; font-weight: bold;
      cursor: pointer; font-family: 'Outfit', sans-serif;
    }
    .btn-admin-cancel {
      flex: 1; padding: 12px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08);
      color: #fff; font-size: 16px; cursor: pointer; font-family: 'Outfit', sans-serif;
    }

    /* イベント選択画面 */
    #event-select { display: none; margin-top: 20px; }
    .event-btn {
      width: 100%; padding: 14px; border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
      color: #fff; font-size: 16px; font-weight: bold;
      cursor: pointer; font-family: 'Outfit', sans-serif;
      margin-bottom: 10px; transition: all 0.2s; text-align: left;
    }
    .event-btn:hover { background: rgba(255,215,0,0.1); border-color: rgba(255,215,0,0.5); }
    .event-btn.current { background: rgba(255,215,0,0.15); border-color: #FFD700; color: #FFD700; }
    .event-btn .event-name { font-size: 17px; }
    .event-btn .event-count { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    .event-btn.current .event-count { color: rgba(255,215,0,0.6); }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <a href="index.html" class="btn-back">← ゲームに戻る</a>
    <span class="header-title">📋 お品書き</span>
    <div class="header-right">
      <div class="view-toggle">
        <button class="toggle-btn" id="btn-carousel" onclick="setView('carousel')" title="カルーセル">◀▶</button>
        <button class="toggle-btn active" id="btn-tile" onclick="setView('tile')" title="タイル">⊞</button>
      </div>
      <button class="admin-btn" onclick="openAdmin()" title="管理者">⚙</button>
    </div>
  </div>

  <!-- Page Hero -->
  <div class="page-hero">
    <h1>お品書き</h1>
    <p>Kanazawa Moataro</p>
  </div>
  <div id="event-badge"><span class="badge" id="badge-text">📅 読み込み中...</span></div>

  <!-- Tile View -->
  <div id="tile-view"><div class="tile-grid" id="tile-grid"></div></div>

  <!-- Carousel View -->
  <div id="carousel-view">
    <div class="items-count" id="carousel-counter"></div>
    <div class="carousel-wrapper">
      <div class="carousel-track" id="carousel-track"></div>
    </div>
    <div class="carousel-controls">
      <button class="carousel-btn" onclick="moveCarousel(-1)">‹</button>
      <div class="carousel-dots" id="carousel-dots"></div>
      <button class="carousel-btn" onclick="moveCarousel(1)">›</button>
    </div>
  </div>

  <!-- 管理者モーダル -->
  <div id="admin-modal">
    <div class="admin-box">
      <h2>⚙ 管理者モード</h2>
      <p id="admin-msg">パスワードを入力してください</p>
      <input type="password" class="admin-input" id="admin-pw" placeholder="••••" maxlength="20"
             onkeydown="if(event.key==='Enter') checkAdminPw()">
      <div class="admin-btn-row">
        <button class="btn-admin-ok" onclick="checkAdminPw()">確認</button>
        <button class="btn-admin-cancel" onclick="closeAdmin()">閉じる</button>
      </div>

      <!-- イベント選択（認証後に表示） -->
      <div id="event-select">
        <p style="margin-bottom:12px;font-size:14px;color:rgba(255,255,255,0.5);">表示するイベントを選択</p>
        <div id="event-buttons"></div>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // ▼▼▼ 管理者パスワード ▼▼▼
    // ============================================================
    const ADMIN_PASSWORD = 'moataro';

    // ============================================================
    // ▼▼▼ イベント一覧と作品リスト ▼▼▼
    // イベントを追加する場合は、このオブジェクトに追記してください
    // ============================================================
    const EVENTS = {
      kurima: {
        label: '名古屋クリマ',
        products: [
          {
            image: 'images/kurima/keychain.jpg',
            name:  'モアイロボ ヨーグルトランEX\nカートリッジキーホルダー',
            price: '要問合せ',
            desc:  'スマホをかざすと遊べる！AR対応ゲームカートリッジ型キーホルダー。'
          },
          {
            image: 'images/kurima/glasses_stand.jpg',
            name:  'まちょい モアイな\nメガネスタンド',
            price: '要問合せ',
            desc:  '頭にはメガネクロス付き。マッチョなモアイがメガネをがっしりホールド。'
          },
          // ここに クリマ の作品を追加
        ]
      },
      designfesta: {
        label: 'デザインフェスタ',
        products: [
          // ここに デザフェス の作品を追加
          // {
          //   image: 'images/designfesta/item1.jpg',
          //   name:  '作品名',
          //   price: '¥1,000',
          //   desc:  '説明文'
          // },
        ]
      },
    };

    // デフォルトのイベント（管理者が切り替えるまでこれが表示される）
    const DEFAULT_EVENT = 'kurima';
    // ============================================================
    // ▲▲▲ ここまで ▲▲▲
    // ============================================================

    // ===== Event Loading =====
    let currentEventKey = localStorage.getItem('moataro_event') || DEFAULT_EVENT;
    if (!EVENTS[currentEventKey]) currentEventKey = DEFAULT_EVENT;

    function buildViews() {
      const event = EVENTS[currentEventKey];
      const products = event.products;

      // Update badge
      document.getElementById('badge-text').textContent = `📅 ${event.label}`;

      // Build Tile
      const tileGrid = document.getElementById('tile-grid');
      tileGrid.innerHTML = '';
      if (products.length === 0) {
        tileGrid.innerHTML = '<p style="text-align:center;color:rgba(255,255,255,0.3);padding:40px 0;grid-column:1/-1;">作品を準備中です</p>';
      } else {
        products.forEach(p => {
          tileGrid.innerHTML += `
            <div class="product-card-tile">
              <img src="${p.image}" alt="${p.name.replace(/\n/g,' ')}">
              <div class="product-info-tile">
                <div class="product-name-tile">${p.name.replace(/\n/g,'<br>')}</div>
                <div class="product-price-tile">${p.price}</div>
              </div>
            </div>`;
        });
      }

      // Build Carousel
      const track = document.getElementById('carousel-track');
      const dotsContainer = document.getElementById('carousel-dots');
      track.innerHTML = '';
      dotsContainer.innerHTML = '';
      products.forEach((p, i) => {
        track.innerHTML += `
          <div class="carousel-slide">
            <div class="product-card-large">
              <img src="${p.image}" alt="${p.name.replace(/\n/g,' ')}">
              <div class="product-info-large">
                <div class="product-name-large">${p.name.replace(/\n/g,'<br>')}</div>
                <div class="product-desc">${p.desc || ''}</div>
                <div class="product-price-large">${p.price}</div>
              </div>
            </div>
          </div>`;
        dotsContainer.innerHTML += `<div class="dot ${i===0?'active':''}" onclick="goToSlide(${i})"></div>`;
      });

      currentSlide = 0;
      updateCarousel();
    }

    // ===== View Toggle =====
    function setView(mode) {
      document.getElementById('carousel-view').style.display = mode === 'carousel' ? 'block' : 'none';
      document.getElementById('tile-view').style.display = mode === 'tile' ? 'block' : 'none';
      document.getElementById('btn-carousel').classList.toggle('active', mode === 'carousel');
      document.getElementById('btn-tile').classList.toggle('active', mode === 'tile');
    }

    // ===== Carousel Logic =====
    let currentSlide = 0;
    function updateCarousel() {
      const products = EVENTS[currentEventKey].products;
      document.getElementById('carousel-track').style.transform = `translateX(-${currentSlide * 100}%)`;
      document.getElementById('carousel-counter').textContent = products.length > 0 ? `${currentSlide + 1} / ${products.length}` : '';
      document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === currentSlide));
    }
    function moveCarousel(dir) {
      const len = EVENTS[currentEventKey].products.length;
      if (len === 0) return;
      currentSlide = (currentSlide + dir + len) % len;
      updateCarousel();
    }
    function goToSlide(i) { currentSlide = i; updateCarousel(); }

    // Swipe
    let touchStartX = 0;
    document.getElementById('carousel-track').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    document.getElementById('carousel-track').addEventListener('touchend', e => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) moveCarousel(diff > 0 ? 1 : -1);
    });

    // ===== Admin Modal =====
    function openAdmin() {
      document.getElementById('admin-modal').classList.add('active');
      document.getElementById('admin-pw').value = '';
      document.getElementById('admin-msg').textContent = 'パスワードを入力してください';
      document.getElementById('event-select').style.display = 'none';
      setTimeout(() => document.getElementById('admin-pw').focus(), 100);
    }

    function closeAdmin() {
      document.getElementById('admin-modal').classList.remove('active');
    }

    function checkAdminPw() {
      const pw = document.getElementById('admin-pw').value;
      if (pw === ADMIN_PASSWORD) {
        document.getElementById('admin-pw').style.display = 'none';
        document.querySelector('.admin-btn-row').style.display = 'none';
        document.getElementById('admin-msg').textContent = '✅ 認証OK！イベントを選択してください';
        document.getElementById('admin-msg').style.color = '#4eff91';
        showEventSelect();
      } else {
        document.getElementById('admin-msg').textContent = '❌ パスワードが違います';
        document.getElementById('admin-msg').style.color = '#ff4a4a';
        document.getElementById('admin-pw').value = '';
      }
    }

    function showEventSelect() {
      const sel = document.getElementById('event-select');
      const btns = document.getElementById('event-buttons');
      btns.innerHTML = '';
      Object.entries(EVENTS).forEach(([key, ev]) => {
        const count = ev.products.length;
        const isCurrent = key === currentEventKey;
        btns.innerHTML += `
          <button class="event-btn ${isCurrent ? 'current' : ''}" onclick="switchEvent('${key}')">
            <div class="event-name">${isCurrent ? '✓ ' : ''}${ev.label}</div>
            <div class="event-count">作品 ${count}点</div>
          </button>`;
      });
      sel.style.display = 'block';
    }

    function switchEvent(key) {
      currentEventKey = key;
      localStorage.setItem('moataro_event', key);
      buildViews();
      closeAdmin();
    }

    // ===== Init =====
    buildViews();
  </script>
</body>
</html>
