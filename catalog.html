<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>お品書き | Kanazawa Moataro</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=DotGothic16&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== HEADER ===== */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .btn-back {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.15); }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    /* View toggle */
    .view-toggle {
      display: flex;
      gap: 6px;
    }
    .toggle-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.5);
      width: 36px;
      height: 36px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .toggle-btn.active {
      background: rgba(0,210,255,0.2);
      border-color: #00d2ff;
      color: #00d2ff;
    }

    /* ===== PAGE TITLE ===== */
    .page-hero {
      text-align: center;
      padding: 36px 20px 24px;
    }
    .page-hero h1 {
      font-size: clamp(28px, 8vw, 48px);
      font-weight: 900;
      background: linear-gradient(90deg, #fff 0%, #00d2ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 4px;
      margin-bottom: 6px;
    }
    .page-hero p {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 2px;
    }

    /* ===== CAROUSEL VIEW ===== */
    #carousel-view { display: none; }
    #tile-view { display: block; }

    .carousel-wrapper {
      position: relative;
      overflow: hidden;
      padding-bottom: 20px;
    }

    .carousel-track {
      display: flex;
      transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }

    .carousel-slide {
      min-width: 100%;
      padding: 10px 24px 30px;
      display: flex;
      justify-content: center;
    }

    .product-card-large {
      background: linear-gradient(145deg, #141420, #1e1e2e);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      overflow: hidden;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .product-card-large img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      display: block;
    }

    .product-info-large {
      padding: 20px 24px 28px;
    }

    .product-name-large {
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .product-desc {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .product-price-large {
      font-size: clamp(20px, 5vw, 28px);
      font-weight: 900;
      color: #00d2ff;
      font-family: 'DotGothic16', sans-serif;
      letter-spacing: 1px;
    }

    /* Carousel Controls */
    .carousel-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 10px 0 24px;
    }

    .carousel-btn {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .carousel-btn:hover { background: rgba(0,210,255,0.2); border-color: #00d2ff; }

    .carousel-dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      cursor: pointer;
      transition: all 0.2s;
    }
    .dot.active {
      background: #00d2ff;
      width: 20px;
      border-radius: 4px;
    }

    /* ===== TILE VIEW ===== */
    .tile-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      padding: 10px 16px 40px;
      max-width: 700px;
      margin: 0 auto;
    }

    .product-card-tile {
      background: linear-gradient(145deg, #141420, #1e1e2e);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .product-card-tile:active {
      transform: scale(0.97);
    }

    .product-card-tile img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      display: block;
    }

    .product-info-tile {
      padding: 12px 14px 16px;
    }

    .product-name-tile {
      font-size: clamp(12px, 3.5vw, 15px);
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .product-price-tile {
      font-size: clamp(14px, 4vw, 18px);
      font-weight: 900;
      color: #00d2ff;
      font-family: 'DotGothic16', sans-serif;
    }

    /* ===== COUNT BADGE ===== */
    .items-count {
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 13px;
      padding-bottom: 8px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <a href="index.html" class="btn-back">← ゲームに戻る</a>
    <span class="header-title">📋 お品書き</span>
    <div class="view-toggle">
      <button class="toggle-btn" id="btn-carousel" onclick="setView('carousel')" title="カルーセル">◀▶</button>
      <button class="toggle-btn active" id="btn-tile" onclick="setView('tile')" title="タイル">⊞</button>
    </div>
  </div>

  <!-- Page Hero -->
  <div class="page-hero">
    <h1>お品書き</h1>
    <p>Kanazawa Moataro</p>
  </div>

  <div id="carousel-view" style="display:none;">
    <div class="items-count" id="carousel-counter">1 / 2</div>
    <div class="carousel-wrapper">
      <div class="carousel-track" id="carousel-track">

        <!-- 作品1 -->
        <div class="carousel-slide">
          <div class="product-card-large">
            <img src="2025122133.jpg" alt="モアイロボ ヨーグルトランEX カートリッジキーホルダー">
            <div class="product-info-large">
              <div class="product-name-large">モアイロボ ヨーグルトランEX<br>カートリッジキーホルダー</div>
              <div class="product-desc">スマホをかざすと遊べる！AR対応ゲームカートリッジ型キーホルダー。</div>
              <div class="product-price-large">価格：お問い合わせください</div>
            </div>
          </div>
        </div>

        <!-- 作品2 -->
        <div class="carousel-slide">
          <div class="product-card-large">
            <img src="202604281.jpg" alt="まちょいモアイなメガネスタンド">
            <div class="product-info-large">
              <div class="product-name-large">まちょい<br>モアイなメガネスタンド</div>
              <div class="product-desc">頭にはメガネクロス付き。マッチョなモアイがメガネをがっしりホールド。</div>
              <div class="product-price-large">価格：お問い合わせください</div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Controls -->
    <div class="carousel-controls">
      <button class="carousel-btn" onclick="moveCarousel(-1)">‹</button>
      <div class="carousel-dots" id="carousel-dots">
        <div class="dot active" onclick="goToSlide(0)"></div>
        <div class="dot" onclick="goToSlide(1)"></div>
      </div>
      <button class="carousel-btn" onclick="moveCarousel(1)">›</button>
    </div>
  </div>

  <!-- ===== TILE VIEW ===== -->
  <div id="tile-view">
    <div class="tile-grid">

      <div class="product-card-tile">
        <img src="2025122133.jpg" alt="カートリッジキーホルダー">
        <div class="product-info-tile">
          <div class="product-name-tile">モアイロボ ヨーグルトランEX キーホルダー</div>
          <div class="product-price-tile">要問合せ</div>
        </div>
      </div>

      <div class="product-card-tile">
        <img src="202604281.jpg" alt="メガネスタンド">
        <div class="product-info-tile">
          <div class="product-name-tile">まちょい モアイな メガネスタンド</div>
          <div class="product-price-tile">要問合せ</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ===== View Toggle =====
    function setView(mode) {
      document.getElementById('carousel-view').style.display = mode === 'carousel' ? 'block' : 'none';
      document.getElementById('tile-view').style.display = mode === 'tile' ? 'block' : 'none';
      document.getElementById('btn-carousel').classList.toggle('active', mode === 'carousel');
      document.getElementById('btn-tile').classList.toggle('active', mode === 'tile');
    }

    // ===== Carousel =====
    let currentSlide = 0;
    const totalSlides = 2;

    function updateCarousel() {
      document.getElementById('carousel-track').style.transform = `translateX(-${currentSlide * 100}%)`;
      document.getElementById('carousel-counter').textContent = `${currentSlide + 1} / ${totalSlides}`;
      document.querySelectorAll('.dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === currentSlide);
      });
    }

    function moveCarousel(dir) {
      currentSlide = (currentSlide + dir + totalSlides) % totalSlides;
      updateCarousel();
    }

    function goToSlide(index) {
      currentSlide = index;
      updateCarousel();
    }

    // Swipe support
    let touchStartX = 0;
    const track = document.getElementById('carousel-track');
    track.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    track.addEventListener('touchend', e => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) moveCarousel(diff > 0 ? 1 : -1);
    });
  </script>

</body>
</html>
