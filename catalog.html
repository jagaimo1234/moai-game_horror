<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>お品書き | Kanazawa Moataro</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=DotGothic16&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; color: #fff; font-family: 'Outfit', sans-serif; min-height: 100vh; overflow-x: hidden; }

    /* ===== HEADER ===== */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
    }
    .btn-back {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px;
      font-family: 'Outfit', sans-serif; cursor: pointer; text-decoration: none;
      display: flex; align-items: center; gap: 5px; white-space: nowrap;
    }
    .header-title { font-size: 17px; font-weight: 700; letter-spacing: 2px; }
    .view-toggle { display: flex; gap: 6px; }
    .toggle-btn {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.5); width: 34px; height: 34px; border-radius: 10px;
      cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .toggle-btn.active { background: rgba(0,210,255,0.2); border-color: #00d2ff; color: #00d2ff; }

    /* ===== PAGE HERO ===== */
    .page-hero { text-align: center; padding: 28px 20px 10px; }
    .page-hero h1 {
      font-size: clamp(26px, 7vw, 44px); font-weight: 900;
      background: linear-gradient(90deg, #fff 0%, #00d2ff 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 4px; margin-bottom: 4px;
    }
    .page-hero p { font-size: 13px; color: rgba(255,255,255,0.4); letter-spacing: 2px; }

    /* ===== EVENT TABS ===== */
    .event-tabs {
      display: flex; gap: 10px; padding: 16px 16px 8px;
      justify-content: center; flex-wrap: wrap;
    }
    .event-tab {
      padding: 10px 22px; border-radius: 30px; font-size: clamp(14px, 4vw, 16px);
      font-weight: 700; cursor: pointer; font-family: 'Outfit', sans-serif;
      border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.5); transition: all 0.2s; white-space: nowrap;
    }
    .event-tab.active {
      background: rgba(255,215,0,0.15); border-color: #FFD700;
      color: #FFD700; box-shadow: 0 0 16px rgba(255,215,0,0.2);
    }
    .item-count {
      text-align: center; font-size: 12px; color: rgba(255,255,255,0.3);
      padding-bottom: 6px; letter-spacing: 1px;
    }

    /* ===== TILE VIEW ===== */
    #tile-view { display: block; }
    #carousel-view { display: none; }

    .tile-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 14px; padding: 10px 16px 40px; max-width: 700px; margin: 0 auto;
    }
    .product-card-tile {
      background: linear-gradient(145deg, #141420, #1e1e2e);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 18px;
      overflow: hidden; transition: transform 0.2s;
    }
    .product-card-tile:active { transform: scale(0.97); }
    .product-info-tile { padding: 12px 14px 14px; }
    .product-name-tile { font-size: clamp(12px, 3.5vw, 15px); font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
    .tile-hint { font-size: 11px; color: rgba(0,210,255,0.5); letter-spacing: 0.5px; }
    .product-price-tile { font-size: clamp(14px, 4vw, 18px); font-weight: 900; color: #00d2ff; font-family: 'DotGothic16', sans-serif; }

    /* ===== CAROUSEL VIEW ===== */
    .carousel-wrapper { overflow: hidden; position: relative; }
    .carousel-track { display: flex; transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    .carousel-slide { min-width: 100%; padding: 10px 24px 30px; display: flex; justify-content: center; }
    .product-card-large {
      background: linear-gradient(145deg, #141420, #1e1e2e);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 24px;
      overflow: hidden; max-width: 500px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .main-product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
    .product-info-large { padding: 20px 24px 28px; }
    .product-name-large { font-size: clamp(18px, 5vw, 24px); font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
    .product-desc { font-size: 14px; color: rgba(255,255,255,0.55); line-height: 1.6; margin-bottom: 16px; }
    .product-price-large { font-size: clamp(20px, 5vw, 28px); font-weight: 900; color: #00d2ff; font-family: 'DotGothic16', sans-serif; }

    /* ===== THUMBNAIL STRIP ===== */
    .thumb-strip {
      display: flex; gap: 8px; overflow-x: auto;
      padding: 12px 16px 16px; scrollbar-width: none;
    }
    .thumb-strip::-webkit-scrollbar { display: none; }
    .thumb-item {
      width: 68px; min-width: 68px; height: 68px; border-radius: 10px;
      overflow: hidden; border: 2px solid transparent;
      cursor: grab; transition: border-color 0.2s; flex-shrink: 0;
    }
    .thumb-item.active { border-color: #00d2ff; box-shadow: 0 0 8px rgba(0,210,255,0.4); }
    .thumb-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .carousel-btn-overlay {
      position: absolute;
      top: 150px; /* Mobile middle of image */
      transform: translateY(-50%);
      width: 50px; height: 50px;
      background: transparent;
      border: none; color: rgba(255,255,255,0.3);
      font-size: 50px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; z-index: 10;
      -webkit-tap-highlight-color: transparent;
    }
    @media (min-width: 500px) { .carousel-btn-overlay { top: 220px; } }
    .carousel-btn-overlay:hover, .carousel-btn-overlay:active {
      color: #fff; text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }
    .carousel-btn-left { left: 5px; }
    .carousel-btn-right { right: 5px; }
    .carousel-dots { display: flex; gap: 8px; align-items: center; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.25); cursor: pointer; transition: all 0.2s; }
    .dot.active { background: #00d2ff; width: 20px; border-radius: 4px; }
    .carousel-counter { text-align: center; color: rgba(255,255,255,0.3); font-size: 13px; padding-bottom: 8px; }

    /* empty state */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: rgba(255,255,255,0.3); font-size: 16px;
      grid-column: 1 / -1;
    }
    .empty-state .emoji { font-size: 48px; display: block; margin-bottom: 12px; }

    /* Badges & Admin UI */
    .badge {
      display: inline-block; padding: 4px 8px; border-radius: 12px; font-weight: bold;
      font-size: 11px; text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      box-shadow: 0 2px 6px rgba(0,0,0,0.3); pointer-events: none; white-space: nowrap;
    }
    .badge-super { background: linear-gradient(135deg, #ffcc00, #ff6600); color: #fff; }
    .badge-recommend { background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: #fff; }

    #admin-modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center;
    }
    .admin-content {
      background: #1e1e2e; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px;
      text-align: center; border: 1px solid rgba(255,255,255,0.1);
    }
    .admin-input {
      width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white;
      box-sizing: border-box;
    }
    .admin-btn {
      background: #00d2ff; color: #000; padding: 12px 24px; border-radius: 30px;
      font-weight: bold; cursor: pointer; border: none; width: 100%;
    }
    .admin-edit-btn {
      display: none; position: absolute; top: 12px; right: 12px;
      background: rgba(0,0,0,0.8); color: white; padding: 6px 12px;
      border-radius: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.4);
      z-index: 10; font-size: 13px; font-weight: bold;
    }
    .admin-edit-desc-btn {
      display: none; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
      color: white; padding: 4px 12px; border-radius: 12px; font-size: 12px; cursor: pointer;
      margin-top: 8px; transition: background 0.2s;
    }
    .admin-edit-desc-btn:hover { background: rgba(255,255,255,0.15); }
    .admin-mode .admin-edit-btn { display: block; }
    .admin-mode .admin-edit-desc-btn { display: inline-block; }

    /* Epic Story UI */
    .history-epic-story {
      margin: 10px auto 20px; max-width: 600px; padding: 20px 16px;
      background: linear-gradient(180deg, rgba(20,20,30,0.8) 0%, rgba(10,10,15,0.95) 100%);
      border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 8px;
      text-align: center; position: relative;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(255,215,0,0.03);
      animation: fadeInEpic 1s ease-out;
    }
    @keyframes fadeInEpic { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .history-epic-story::before {
      content: '✦'; position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
      color: #FFD700; font-size: 18px; background: #0a0a0f; padding: 0 15px;
    }
    .epic-title {
      font-family: 'Shippori Mincho', 'Noto Serif JP', 'Yu Mincho', 'Hiragino Mincho ProN', serif;
      font-size: 18px; color: #FFD700; letter-spacing: 4px; margin-bottom: 12px; font-weight: normal;
    }
    .epic-portrait {
      width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
      margin: 0 auto 16px; display: block; border: 2px solid rgba(255, 215, 0, 0.4);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.15); filter: contrast(1.2) grayscale(0.2);
      background: #fff;
    }
    .epic-text {
      font-family: 'Shippori Mincho', 'Noto Serif JP', 'Yu Mincho', 'Hiragino Mincho ProN', serif;
      font-size: clamp(13px, 3.5vw, 15px); line-height: 1.6; color: rgba(255, 255, 255, 0.9);
      letter-spacing: 1px;
    }
    .epic-footer {
      margin-top: 16px; font-size: 11px; color: rgba(255,255,255,0.4);
      border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; line-height: 1.4;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <a href="index.html" class="btn-back">← 戻る</a>
    <span class="header-title" id="admin-trigger" style="cursor:default;" title="お品書き">📋 お品書き</span>
    <div class="view-toggle">
      <button class="toggle-btn" id="btn-carousel" onclick="setView('carousel')" title="カルーセル">◀▶</button>
      <button class="toggle-btn active" id="btn-tile" onclick="setView('tile')" title="タイル">⊞</button>
    </div>
  </div>

  <!-- Page Hero -->
  <div class="page-hero">
    <h1>お品書き</h1>
    <p>Kanazawa Moataro</p>
  </div>

  <!-- Admin Modal (Less Conspicuous) -->
  <div id="admin-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; justify-content:center; align-items:center; flex-direction:column;">
    <div style="background:#1e1e2e; padding:30px 40px; border-radius:16px; text-align:center; border:1px solid rgba(255,255,255,0.1);">
      <div style="font-size:24px; margin-bottom:20px;">👤</div>

        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Googleでログイン
      </button>
      <div id="admin-cancel-btn" style="margin-top:20px; color:#888; font-size:13px; cursor:pointer;">キャンセル</div>
    </div>
  </div>

  <!-- Edit Description Modal -->
  <div id="desc-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center;">
    <div style="background:#1e1e2e; padding:20px; border-radius:16px; width:90%; max-width:400px; border:1px solid rgba(255,255,255,0.1);">
      <h3 style="margin-bottom:15px; font-size:16px; color:#fff;">説明文の編集</h3>
      <textarea id="desc-textarea" rows="6" style="width:100%; background:rgba(0,0,0,0.5); color:white; border:1px solid rgba(255,255,255,0.2); border-radius:8px; padding:12px; margin-bottom:15px; font-family:inherit; resize:vertical; box-sizing:border-box;"></textarea>
      <div style="display:flex; gap:10px; justify-content:flex-end;">
        <button onclick="document.getElementById('desc-modal').style.display='none'" style="padding:8px 16px; background:transparent; border:none; color:#888; cursor:pointer;">キャンセル</button>
        <button id="desc-save-btn" style="padding:8px 24px; background:#00d2ff; color:#000; border:none; border-radius:20px; font-weight:bold; cursor:pointer;">保存</button>
      </div>
    </div>
  </div>

  <!-- Event Tabs -->
  <div class="event-tabs" id="event-tabs"></div>
  <div class="item-count" id="item-count"></div>
  <div id="tab-hero-container" style="padding: 0 16px;"></div>

  <!-- Tile View -->
  <div id="tile-view"><div class="tile-grid" id="tile-grid"></div></div>

  <!-- Carousel View -->
  <div id="carousel-view">
    <div style="text-align:center; padding: 10px 0 4px;">
      <button onclick="setView('tile')" style="
        background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
        color: rgba(255,255,255,0.5); padding: 6px 16px; border-radius: 20px;
        font-size: 13px; cursor: pointer; font-family: 'Outfit', sans-serif;
      ">← 一覧に戻る</button>
    </div>
    <div class="carousel-counter" id="carousel-counter"></div>
    <div class="carousel-wrapper">
      <button class="carousel-btn-overlay carousel-btn-left" onclick="moveCarousel(-1)">‹</button>
      <button class="carousel-btn-overlay carousel-btn-right" onclick="moveCarousel(1)">›</button>
      <div class="carousel-track" id="carousel-track"></div>
    </div>
    <div class="carousel-controls" style="display:flex; justify-content:center; padding: 10px 0 30px;">
      <div class="carousel-dots" id="carousel-dots"></div>
    </div>
  </div>

          },
        ]
      },
      designfesta: {
        label: 'デザインフェスタ',
        products: [
          // ↓ デザフェスの作品をここに追加
          // {
          //   image: 'images/designfesta/item1.jpg',
          //   name:  '作品名',
          //   price: '¥1,000',
          //   desc:  '説明文'

        ]
      },
      history: {
        label: '歴代図鑑',
        heroHtml: `
          <div class="history-epic-story">

        `,
        products: [
          {
            id: 'first_sold_work',
            image: 'images/history/first_sold_work.jpg',

          }
        ]
      }
    };

    // デフォルトで最初に選択されるイベント
    const DEFAULT_EVENT = 'kurima';
    // ============================================================
    // ▲▲▲ ここまで ▲▲▲
    // ============================================================

    let currentEventKey = DEFAULT_EVENT;
    let currentSlide = 0;

    // ===== Build event tabs =====
    function buildTabs() {
      const container = document.getElementById('event-tabs');
      container.innerHTML = '';
      Object.entries(EVENTS).forEach(([key, ev]) => {
        container.innerHTML += `
          <button class="event-tab ${key === currentEventKey ? 'active' : ''}"
                  id="tab-${key}" onclick="switchEvent('${key}')">
            ${ev.label}
          </button>`;
      });
    }

    // ===== Switch event =====
    function switchEvent(key) {
      currentEventKey = key;
      currentSlide = 0;
      buildTabs();
      buildViews();
    }

    // ===== Build tile & carousel =====
    function buildViews() {
      const products = EVENTS[currentEventKey].products;
      // Ensure all products have an ID
      products.forEach(p => {
        if (!p.id) p.id = p.image.split('/').pop().split('.')[0];
      });

      // Item count & Tab description
      const eventData = EVENTS[currentEventKey];
      let countHtml = products.length > 0 ? `${products.length}点` : '';
      if (eventData.tabDesc) {
        countHtml += `<div style="margin-top:10px; color:rgba(255,215,0,0.8); font-size:13px; line-height:1.5; font-weight:bold;">${eventData.tabDesc.replace(/\n/g,'<br>')}</div>`;
      }
      document.getElementById('item-count').innerHTML = countHtml;

      // Hero Container
      document.getElementById('tab-hero-container').innerHTML = eventData.heroHtml || '';

      // --- Tile ---
      const tileGrid = document.getElementById('tile-grid');
      tileGrid.innerHTML = '';
      if (products.length === 0) {
        tileGrid.innerHTML = `
          <div class="empty-state">
            <span class="emoji">🚧</span>
            作品を準備中です<br>お楽しみに！
          </div>`;
      } else {
        products.forEach((p, i) => {
          const badgeHtml = `<div class="badge" id="badge-${p.id}" style="display:none;"></div>`;
          const adminBtnHtml = `<button class="admin-edit-btn" onclick="event.stopPropagation(); toggleBadge('${p.id}')">👍 切替</button>`;
          tileGrid.innerHTML += `
            <div class="product-card-tile" onclick="openDetail(${i})">
              <div style="position:relative;">
                ${adminBtnHtml}
                <img class="main-product-img" src="${p.image}" alt="${p.name.replace(/\n/g,' ')}">
              </div>
              <div class="product-info-tile">
                <div class="product-name-tile">${p.name.replace(/\n/g,'<br>')}</div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                  <div class="tile-hint">詳細を見る →</div>
                  ${badgeHtml}
                </div>
              </div>
            </div>`;
        });
      }

      // --- Carousel ---
      const track = document.getElementById('carousel-track');
      const dots  = document.getElementById('carousel-dots');
      track.innerHTML = '';
      dots.innerHTML  = '';
      if (products.length === 0) {
        track.innerHTML = `
          <div class="carousel-slide">
            <div style="text-align:center;padding:60px 20px;color:rgba(255,255,255,0.3);">
              <div style="font-size:48px;margin-bottom:12px;">🚧</div>
              作品を準備中です
            </div>
          </div>`;
      } else {
        products.forEach((p, i) => {
          const extraImgs = p.images && p.images.length > 1 ? p.images : null;
          const thumbHtml = extraImgs ? `
            <div class="thumb-strip" id="thumbs-${i}">
              ${extraImgs.map((img, j) => `
                <div class="thumb-item ${j===0?'active':''}" onclick="setMainImg(${i},'${img}',this)">
                  <img src="${img}" loading="lazy" alt="">
                </div>`).join('')}
            </div>` : '';
          
          const badgeLargeHtml = `<div class="badge" id="badge-large-${p.id}" style="display:none;"></div>`;
          const adminBtnHtml = `<button class="admin-edit-btn" onclick="event.stopPropagation(); toggleBadge('${p.id}')">👍 切替</button>`;

          track.innerHTML += `
            <div class="carousel-slide">
              <div class="product-card-large">
                <div style="position:relative;">
                  ${adminBtnHtml}
                  <img class="main-product-img" id="main-img-${i}" src="${p.image}" alt="${p.name.replace(/\n/g,' ')}">
                </div>
                ${thumbHtml}
                <div class="product-info-large">
                  <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px;">
                    <div class="product-name-large">${p.name.replace(/\n/g,'<br>')}</div>
                    ${badgeLargeHtml}
                  </div>
                  <div class="product-desc" id="desc-text-${p.id}">${(p.desc || '').replace(/\n/g, '<br>')}</div>
                  <button class="admin-edit-desc-btn" onclick="openDescModal('${p.id}')">✏️ 説明文を編集</button>
                </div>
              </div>
            </div>`;
          dots.innerHTML += `<div class="dot ${i===0?'active':''}" onclick="goToSlide(${i})"></div>`;
        });
      }

      updateCarousel();
      enableDragScroll();
      window.dispatchEvent(new Event('viewsBuilt'));
    }

    // ===== Open detail from tile =====
    function openDetail(index) {
      currentSlide = index;
      setView('carousel');
      updateCarousel();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ===== Switch main image in detail =====
    function setMainImg(slideIndex, imgUrl, thumbEl) {
      const mainImg = document.getElementById(`main-img-${slideIndex}`);
      if (mainImg) mainImg.src = imgUrl;
      const strip = document.getElementById(`thumbs-${slideIndex}`);
      if (strip) strip.querySelectorAll('.thumb-item').forEach(t => t.classList.remove('active'));
      if (thumbEl) thumbEl.classList.add('active');
    }

    // ===== View toggle =====
    function setView(mode) {
      document.getElementById('tile-view').style.display     = mode === 'tile'     ? 'block' : 'none';
      document.getElementById('carousel-view').style.display = mode === 'carousel' ? 'block' : 'none';
      document.getElementById('btn-tile').classList.toggle('active',     mode === 'tile');
      document.getElementById('btn-carousel').classList.toggle('active', mode === 'carousel');
    }

    // ===== Carousel logic =====
    function updateCarousel() {
      const products = EVENTS[currentEventKey].products;
      document.getElementById('carousel-track').style.transform = `translateX(-${currentSlide * 100}%)`;
      document.getElementById('carousel-counter').textContent =
        products.length > 0 ? `${currentSlide + 1} / ${products.length}` : '';
      document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === currentSlide));
    }
    function moveCarousel(dir) {
      const len = EVENTS[currentEventKey].products.length;
      if (len === 0) return;
      currentSlide = (currentSlide + dir + len) % len;
      updateCarousel();
    }
    function goToSlide(i) { currentSlide = i; updateCarousel(); }

// Swipe navigation between products disabled – use buttons only
// let touchStartX = 0;
// let touchStartY = 0;
// document.getElementById('carousel-track').addEventListener('touchstart', e => {
//   touchStartX = e.touches[0].clientX;
//   touchStartY = e.touches[0].clientY;
// }, { passive: true });
// document.getElementById('carousel-track').addEventListener('touchend', e => {
//   const diffX = touchStartX - e.changedTouches[0].clientX;
//   const diffY = touchStartY - e.changedTouches[0].clientY;
//   if (Math.abs(diffX) > 50 && Math.abs(diffX) > Math.abs(diffY)) {
//     moveCarousel(diffX > 0 ? 1 : -1);
//   }
// });

    // ===== Thumb Strip Drag to Scroll (PC) =====
    function enableDragScroll() {
      document.querySelectorAll('.thumb-strip').forEach(strip => {
        // Prevent touch events from bubbling up to carousel-track
        strip.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
        strip.addEventListener('touchmove', e => e.stopPropagation(), { passive: true });
        strip.addEventListener('touchend', e => e.stopPropagation());

        let isDown = false;
        let startX;
        let scrollLeft;
        
        strip.addEventListener('mousedown', (e) => {
          isDown = true;
          strip.style.cursor = 'grabbing';
          startX = e.pageX - strip.offsetLeft;
          scrollLeft = strip.scrollLeft;
        });
        strip.addEventListener('mouseleave', () => {
          isDown = false;
          strip.style.cursor = 'grab';
        });
        strip.addEventListener('mouseup', () => {
          isDown = false;
          strip.style.cursor = 'grab';
        });
        strip.addEventListener('mousemove', (e) => {
          if (!isDown) return;
          e.preventDefault();
          const x = e.pageX - strip.offsetLeft;
          const walk = (x - startX) * 2;
          strip.scrollLeft = scrollLeft - walk;
        });
      });
    }

    // ===== Init =====
    buildTabs();
    buildViews();
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCkDJBvJPxipgkXXXilGlJuEP7_cSv9FEY",
      authDomain: "moai-catalog.firebaseapp.com",
      projectId: "moai-catalog",
      storageBucket: "moai-catalog.firebasestorage.app",
      messagingSenderId: "421468245254",
      appId: "1:421468245254:web:c49e0846d2015820d8a287"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    
    let badgesData = {};
    let descriptionsData = {};
    let currentEditingProductId = null;

    // Listen to descriptions
    onSnapshot(doc(db, "settings", "descriptions"), (docSnap) => {
      if (docSnap.exists()) {
        descriptionsData = docSnap.data();
      } else {
        descriptionsData = {};
      }
      updateAllDescriptions();
    }, (error) => {
      console.error("Firestore descriptions read error:", error);
    });

    function updateAllDescriptions() {
      Object.keys(EVENTS).forEach(ev => {
        EVENTS[ev].products.forEach(p => {
          if (!p.id) return;
          const el = document.getElementById(`desc-text-${p.id}`);
          if (el) {
            const customDesc = descriptionsData[p.id];
            el.innerHTML = (customDesc !== undefined ? customDesc : (p.desc || '')).replace(/\n/g, '<br>');
          }
        });
      });
    }

    // Listen to all badges
    onSnapshot(doc(db, "settings", "badges"), (docSnap) => {
      if (docSnap.exists()) {
        badgesData = docSnap.data();
      } else {
        badgesData = {};
      }
      updateAllBadges();
    }, (error) => {
      console.error("Firestore read error:", error);
      if (error.code === 'permission-denied') {
        console.warn("セキュリティルールにより読み取りが拒否されました。ルールの設定を確認してください。");
      }
    });

    function updateAllBadges() {
      Object.keys(EVENTS).forEach(ev => {
        EVENTS[ev].products.forEach(p => {
          const id = p.id;
          if (!id) return;
          const status = badgesData[id] || 'none';
          
          const els = [document.getElementById(`badge-${id}`), document.getElementById(`badge-large-${id}`)];
          els.forEach(el => {
            if (!el) return;
            if (status === 'super') {
              el.className = 'badge badge-super';
              el.textContent = '👑 超おすすめ';
              el.style.display = 'inline-block';
            } else if (status === 'recommend') {
              el.className = 'badge badge-recommend';
              el.textContent = '👍 おすすめ';
              el.style.display = 'inline-block';
            } else {
              el.style.display = 'none';
            }
          });
        });
      });
    }

    // Toggle Badge Function for Admin
    window.toggleBadge = async (productId) => {
      if (!auth.currentUser) return;
      const current = badgesData[productId] || 'none';
      let next = 'none';
      if (current === 'none') next = 'recommend';
      else if (current === 'recommend') next = 'super';
      else next = 'none';
      
      const prev = badgesData[productId];
      badgesData[productId] = next;
      updateAllBadges(); // optimistic update
      
      try {
        await setDoc(doc(db, "settings", "badges"), badgesData);
      } catch (e) {
        console.error("Firestore write error:", e);
        alert("データベースへの保存に失敗しました（" + e.message + "）。\nFirebaseのルール設定（allow write...）が正しく行われているか、または設定したGmailアドレスと現在ログインしているアカウントが一致しているか確認してください。");
        // Rollback
        badgesData[productId] = prev;
        updateAllBadges();
      }
    };

    // Open Description Edit Modal
    window.openDescModal = (productId) => {
      if (!auth.currentUser) return;
      currentEditingProductId = productId;
      
      let defaultDesc = '';
      Object.keys(EVENTS).forEach(ev => {
        const found = EVENTS[ev].products.find(x => x.id === productId);
        if(found) defaultDesc = found.desc || '';
      });

      const currentDesc = descriptionsData[productId] !== undefined ? descriptionsData[productId] : defaultDesc;
      
      document.getElementById('desc-textarea').value = currentDesc;
      document.getElementById('desc-modal').style.display = 'flex';
    };

    // Save Description
    document.getElementById('desc-save-btn').addEventListener('click', async () => {
      if (!currentEditingProductId) return;
      const newText = document.getElementById('desc-textarea').value;
      const prevText = descriptionsData[currentEditingProductId];
      
      descriptionsData[currentEditingProductId] = newText;
      updateAllDescriptions();
      document.getElementById('desc-modal').style.display = 'none';

      try {
        await setDoc(doc(db, "settings", "descriptions"), descriptionsData);
      } catch (e) {
        console.error("Firestore write error:", e);
        alert("保存に失敗しました（" + e.message + "）。\nFirebaseのルール設定を確認してください。");
        descriptionsData[currentEditingProductId] = prevText;
        updateAllDescriptions();
      }
    });

    // Admin Auth Logic
    const adminModal = document.getElementById('admin-modal');
    // Secret trigger: Double click on the page hero title instead of the header
    let clicks = 0;
    document.querySelector('.page-hero h1').addEventListener('click', () => {
      clicks++;
      if (clicks >= 5) {
        if (auth.currentUser) {
          if (confirm("現在ログイン中です。管理者モードからログアウトしますか？")) {
            signOut(auth).then(() => {
              alert("ログアウトしました。一般画面に戻ります。");
            });
          }
        } else {
          adminModal.style.display = 'flex';
        }
        clicks = 0;
      }
      setTimeout(() => clicks = 0, 2000);
    });

    document.getElementById('admin-cancel-btn').addEventListener('click', () => {
      adminModal.style.display = 'none';
    });

    document.getElementById('admin-login-btn').addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, provider);
        adminModal.style.display = 'none';
        alert("Googleログインに成功しました。管理者モードを有効化しました。");
      } catch (e) {
        console.error(e);
        alert("ログイン失敗: " + e.message);
      }
    });

    onAuthStateChanged(auth, user => {
      if (user) {
        document.body.classList.add('admin-mode');
      } else {
        document.body.classList.remove('admin-mode');
      }
    });

    window.addEventListener('viewsBuilt', updateAllBadges);
  </script>
