<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>お品書き | Kanazawa Moataro</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=DotGothic16&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; color: #fff; font-family: 'Outfit', sans-serif; min-height: 100vh; overflow-x: hidden; }

    /* ===== HEADER ===== */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
    }
    .btn-back {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px;
      font-family: 'Outfit', sans-serif; cursor: pointer; text-decoration: none;
      display: flex; align-items: center; gap: 5px; white-space: nowrap;
    }
    .header-title { font-size: 17px; font-weight: 700; letter-spacing: 2px; }
    .view-toggle { display: flex; gap: 6px; }
    .toggle-btn {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.5); width: 34px; height: 34px; border-radius: 10px;
      cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .toggle-btn.active { background: rgba(0,210,255,0.2); border-color: #00d2ff; color: #00d2ff; }

    /* ===== PAGE HERO ===== */
    .page-hero { text-align: center; padding: 28px 20px 10px; }
    .page-hero h1 {
      font-size: clamp(26px, 7vw, 44px); font-weight: 900;
      background: linear-gradient(90deg, #fff 0%, #00d2ff 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 4px; margin-bottom: 4px;
    }
    .page-hero p { font-size: 13px; color: rgba(255,255,255,0.4); letter-spacing: 2px; }

    /* ===== EVENT TABS ===== */
    .event-tabs {
      display: flex; gap: 10px; padding: 16px 16px 8px;
      justify-content: center; flex-wrap: wrap;
    }
    .event-tab {
      padding: 10px 22px; border-radius: 30px; font-size: clamp(14px, 4vw, 16px);
      font-weight: 700; cursor: pointer; font-family: 'Outfit', sans-serif;
      border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.5); transition: all 0.2s; white-space: nowrap;
    }
    .event-tab.active {
      background: rgba(255,215,0,0.15); border-color: #FFD700;
      color: #FFD700; box-shadow: 0 0 16px rgba(255,215,0,0.2);
    }
    .item-count {
      text-align: center; font-size: 12px; color: rgba(255,255,255,0.3);
      padding-bottom: 6px; letter-spacing: 1px;
    }

    /* ===== TILE VIEW ===== */
    #tile-view { display: block; }
    #carousel-view { display: none; }

    .tile-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 14px; padding: 10px 16px 40px; max-width: 700px; margin: 0 auto;
    }
    .product-card-tile {
      background: linear-gradient(145deg, #141420, #1e1e2e);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 18px;
      overflow: hidden; transition: transform 0.2s;
    }
    .product-card-tile:active { transform: scale(0.97); }
    .product-card-tile img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
    .product-info-tile { padding: 12px 14px 14px; }
    .product-name-tile { font-size: clamp(12px, 3.5vw, 15px); font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
    .tile-hint { font-size: 11px; color: rgba(0,210,255,0.5); letter-spacing: 0.5px; }
    .product-price-tile { font-size: clamp(14px, 4vw, 18px); font-weight: 900; color: #00d2ff; font-family: 'DotGothic16', sans-serif; }

    /* ===== CAROUSEL VIEW ===== */
    .carousel-wrapper { overflow: hidden; position: relative; }
    .carousel-track { display: flex; transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    .carousel-slide { min-width: 100%; padding: 10px 24px 30px; display: flex; justify-content: center; }
    .product-card-large {
      background: linear-gradient(145deg, #141420, #1e1e2e);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 24px;
      overflow: hidden; max-width: 500px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .product-card-large > img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
    .product-info-large { padding: 20px 24px 28px; }
    .product-name-large { font-size: clamp(18px, 5vw, 24px); font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
    .product-desc { font-size: 14px; color: rgba(255,255,255,0.55); line-height: 1.6; margin-bottom: 16px; }
    .product-price-large { font-size: clamp(20px, 5vw, 28px); font-weight: 900; color: #00d2ff; font-family: 'DotGothic16', sans-serif; }

    /* ===== THUMBNAIL STRIP ===== */
    .thumb-strip {
      display: flex; gap: 8px; overflow-x: auto;
      padding: 12px 16px 16px; scrollbar-width: none;
    }
    .thumb-strip::-webkit-scrollbar { display: none; }
    .thumb-item {
      width: 68px; min-width: 68px; height: 68px; border-radius: 10px;
      overflow: hidden; border: 2px solid transparent;
      cursor: grab; transition: border-color 0.2s; flex-shrink: 0;
    }
    .thumb-item.active { border-color: #00d2ff; box-shadow: 0 0 8px rgba(0,210,255,0.4); }
    .thumb-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .carousel-btn-overlay {
      position: absolute;
      top: 150px; /* Mobile middle of image */
      transform: translateY(-50%);
      width: 50px; height: 50px;
      background: transparent;
      border: none; color: rgba(255,255,255,0.3);
      font-size: 50px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; z-index: 10;
      -webkit-tap-highlight-color: transparent;
    }
    @media (min-width: 500px) { .carousel-btn-overlay { top: 220px; } }
    .carousel-btn-overlay:hover, .carousel-btn-overlay:active {
      color: #fff; text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }
    .carousel-btn-left { left: 5px; }
    .carousel-btn-right { right: 5px; }
    .carousel-dots { display: flex; gap: 8px; align-items: center; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.25); cursor: pointer; transition: all 0.2s; }
    .dot.active { background: #00d2ff; width: 20px; border-radius: 4px; }
    .carousel-counter { text-align: center; color: rgba(255,255,255,0.3); font-size: 13px; padding-bottom: 8px; }

    /* empty state */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: rgba(255,255,255,0.3); font-size: 16px;
      grid-column: 1 / -1;
    }
    .empty-state .emoji { font-size: 48px; display: block; margin-bottom: 12px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <a href="index.html" class="btn-back">← 戻る</a>
    <span class="header-title">📋 お品書き</span>
    <div class="view-toggle">
      <button class="toggle-btn" id="btn-carousel" onclick="setView('carousel')" title="カルーセル">◀▶</button>
      <button class="toggle-btn active" id="btn-tile" onclick="setView('tile')" title="タイル">⊞</button>
    </div>
  </div>

  <!-- Page Hero -->
  <div class="page-hero">
    <h1>お品書き</h1>
    <p>Kanazawa Moataro</p>
  </div>

  <!-- Event Tabs -->
  <div class="event-tabs" id="event-tabs"></div>
  <div class="item-count" id="item-count"></div>

  <!-- Tile View -->
  <div id="tile-view"><div class="tile-grid" id="tile-grid"></div></div>

  <!-- Carousel View -->
  <div id="carousel-view">
    <div style="text-align:center; padding: 10px 0 4px;">
      <button onclick="setView('tile')" style="
        background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
        color: rgba(255,255,255,0.5); padding: 6px 16px; border-radius: 20px;
        font-size: 13px; cursor: pointer; font-family: 'Outfit', sans-serif;
      ">← 一覧に戻る</button>
    </div>
    <div class="carousel-counter" id="carousel-counter"></div>
    <div class="carousel-wrapper">
      <button class="carousel-btn-overlay carousel-btn-left" onclick="moveCarousel(-1)">‹</button>
      <button class="carousel-btn-overlay carousel-btn-right" onclick="moveCarousel(1)">›</button>
      <div class="carousel-track" id="carousel-track"></div>
    </div>
    <div class="carousel-controls" style="display:flex; justify-content:center; padding: 10px 0 30px;">
      <div class="carousel-dots" id="carousel-dots"></div>
    </div>
  </div>

  <script>
    // ============================================================
    // ▼▼▼ 作品リスト管理エリア ▼▼▼
    // ------------------------------------------------------------
    // 【フォルダ構成ルール】
    //   images/kurima/          ← カバー画像（タイル一覧に使う1枚）をここに置く
    //   images/kurima/作品名/   ← 詳細画像（複数枚）をここに置く
    //
    // 【設定項目】
    //   image  : カバー画像パス（タイルに表示される1枚）
    //   images : 詳細ページのサムネイルに並べる画像リスト（省略可）
    //            → images/kurima/作品フォルダ/ に入れた画像を指定する
    //   name   : 作品名（\n で改行）
    //   desc   : 説明文
    //
    // 【詳細画像の追加手順】
    //   1. images/kurima/作品名フォルダ/ に画像を入れる
    //   2. 対応する作品の images: [...] にパスを追加する
    // ============================================================
    const EVENTS = {
      kurima: {
        label: '名古屋クリマ',
        products: [
          {
            image: 'images/kurima/moai_robo_mk2_gray.jpg',
            images: [
              'images/kurima/moai_robo_mk2_gray.jpg',
              'images/kurima/moai_robo_mk2/hat_01.png',
              'images/kurima/moai_robo_mk2/hat_02.png',
              'images/kurima/moai_robo_mk2/hat_03.png',
              'images/kurima/moai_robo_mk2/hat_04.png',
              'images/kurima/moai_robo_mk2/duo_01.png',
              'images/kurima/moai_robo_mk2/duo_02.png',
              'images/kurima/moai_robo_mk2/parts_01.png',
              'images/kurima/moai_robo_mk2/parts_02.png',
              'images/kurima/moai_robo_mk2/parts_03.png',
              'images/kurima/moai_robo_mk2/parts_04.png',
              'images/kurima/moai_robo_mk2/hand_01.png',
              'images/kurima/moai_robo_mk2/hand_02.png',
              'images/kurima/moai_robo_mk2/laying_01.png',
              'images/kurima/moai_robo_mk2/action_01.png',
              'images/kurima/moai_robo_mk2/action_02.png',
              'images/kurima/moai_robo_mk2/action_03.png',
              'images/kurima/moai_robo_mk2/stand_01.png',
              'images/kurima/moai_robo_mk2/stand_02.png',
              'images/kurima/moai_robo_mk2/stand_03.png',
              'images/kurima/moai_robo_mk2/stand_04.png',
            ],
            name:  'MOAI ROBO MARK 2',
            desc:  '酒よりヨーグルト好きなモアイロボット。組み立て式フィギュア。カラーバリエーションあり。'
          },
          {
            image: 'images/kurima/moai_robo_mk2_blue.png',
            name:  'MOAI ROBO MARK 2\nblue edition',
            desc:  'ブルーカラーの限定カラー版。箱付き。'
          },
          {
            image: 'images/kurima/moai_robo_mk2_pink.png',
            name:  'MOAI ROBO MARK 2\npink edition',
            desc:  'ピンクカラーの限定カラー版。箱付き。'
          },
          {
            image: 'images/kurima/moai_robo_mk2_trio.jpg',
            name:  'MOAI ROBO MARK 2\n- TRIO EDITION -',
            desc:  'ブルー・グレー・ピンクの3体セット。'
          },
          {
            image: 'images/kurima/moai_robo_yogurt_lover.jpg',
            name:  'MOAI ROBO\n-Yogurt Lover-',
            desc:  '初代モアイロボ。1/144スケール。ヨーグルトを持った愛らしいフィギュア。'
          },
          {
            image: 'images/kurima/moai_robo_strawmilk.jpg',
            name:  'MOAI ROBO\n-Strawmilk Lover-',
            desc:  'いちごミルクが大好きなモアイロボ。1/144スケール。'
          },
          {
            image: 'images/kurima/nomidakure_moai_robo.jpg',
            name:  'のみだくれ\nモアイロボ',
            desc:  '-Drunk Moai Robot- ヨーグルト片手に飲んだくれ。'
          },
          {
            image: 'images/kurima/keychain.jpg',
            name:  'モアイロボ ヨーグルトランEX\nカートリッジキーホルダー',
            desc:  'スマホをかざすと遊べる！AR対応ゲームカートリッジ型キーホルダー。'
          },
          {
            image: 'images/kurima/glasses_stand.jpg',
            name:  'まちょい モアイな\nメガネスタンド',
            desc:  '頭にはメガネクロス付き。マッチョなモアイがメガネをがっしりホールド。'
          },
          {
            image: 'images/kurima/macho_moai_pen.jpg',
            name:  'マッチョな\nモアイペン立て',
            desc:  'しがないマッチョ。パワーッ!!!'
          },
          {
            image: 'images/kurima/positive_moai_pen.jpg',
            name:  'ポジティブモアイ\nペン立て ハチマキSP',
            desc:  '見ているだけで力が湧いてくる。ガンバレ..!!!'
          },
          {
            image: 'images/kurima/osuwari_moai_pen.jpg',
            name:  'おすわり\nモアイペン立て',
            desc:  'ちょこんとあなたの隣で、あなたの行くすえを見守ります。'
          },
          {
            image: 'images/kurima/headphone_moai_vase.jpg',
            name:  'ヘッドホン\nモアイ一輪挿し',
            desc:  'ヘッドホンをつけたモアイが一輪挿しに。インテリアにぴったり。'
          },
          {
            image: 'images/kurima/moai_incense.jpg',
            name:  'モアイお香立て\n「半グレリーゼント番長」',
            desc:  'タバコのようにお香を嚙む。世の不条理にグレたリーゼント番長。'
          },
          {
            image: 'images/kurima/kangaeru_moai.jpg',
            name:  '考えるモアイ',
            desc:  '植物に相性ピッタリ。モアイなりにあなたのそばで一緒に考えてくれます。'
          },
          {
            image: 'images/kurima/naisho_moai.jpg',
            name:  '内省するモアイ',
            desc:  'モアイなりにあなたのそばで常に内省します。'
          },
          {
            image: 'images/kurima/tasogare_moai.jpg',
            name:  '黄昏れモアイ',
            desc:  '仕事前日の憂鬱さを再現。モアイなりにあなたのそばで一緒に黄昏れてくれます。'
          },
        ]
      },
      designfesta: {
        label: 'デザインフェスタ',
        products: [
          // ↓ デザフェスの作品をここに追加
          // {
          //   image: 'images/designfesta/item1.jpg',
          //   name:  '作品名',
          //   price: '¥1,000',
          //   desc:  '説明文'
          // },
        ]
      },
    };

    // デフォルトで最初に選択されるイベント
    const DEFAULT_EVENT = 'kurima';
    // ============================================================
    // ▲▲▲ ここまで ▲▲▲
    // ============================================================

    let currentEventKey = DEFAULT_EVENT;
    let currentSlide = 0;

    // ===== Build event tabs =====
    function buildTabs() {
      const container = document.getElementById('event-tabs');
      container.innerHTML = '';
      Object.entries(EVENTS).forEach(([key, ev]) => {
        container.innerHTML += `
          <button class="event-tab ${key === currentEventKey ? 'active' : ''}"
                  id="tab-${key}" onclick="switchEvent('${key}')">
            ${ev.label}
          </button>`;
      });
    }

    // ===== Switch event =====
    function switchEvent(key) {
      currentEventKey = key;
      currentSlide = 0;
      buildTabs();
      buildViews();
    }

    // ===== Build tile & carousel =====
    function buildViews() {
      const products = EVENTS[currentEventKey].products;

      // Item count
      document.getElementById('item-count').textContent =
        products.length > 0 ? `${products.length}点` : '';

      // --- Tile ---
      const tileGrid = document.getElementById('tile-grid');
      tileGrid.innerHTML = '';
      if (products.length === 0) {
        tileGrid.innerHTML = `
          <div class="empty-state">
            <span class="emoji">🚧</span>
            作品を準備中です<br>お楽しみに！
          </div>`;
      } else {
        products.forEach((p, i) => {
          tileGrid.innerHTML += `
            <div class="product-card-tile" onclick="openDetail(${i})">
              <img src="${p.image}" alt="${p.name.replace(/\n/g,' ')}">
              <div class="product-info-tile">
                <div class="product-name-tile">${p.name.replace(/\n/g,'<br>')}</div>
                <div class="tile-hint">詳細を見る →</div>
              </div>
            </div>`;
        });
      }

      // --- Carousel ---
      const track = document.getElementById('carousel-track');
      const dots  = document.getElementById('carousel-dots');
      track.innerHTML = '';
      dots.innerHTML  = '';
      if (products.length === 0) {
        track.innerHTML = `
          <div class="carousel-slide">
            <div style="text-align:center;padding:60px 20px;color:rgba(255,255,255,0.3);">
              <div style="font-size:48px;margin-bottom:12px;">🚧</div>
              作品を準備中です
            </div>
          </div>`;
      } else {
        products.forEach((p, i) => {
          const extraImgs = p.images && p.images.length > 1 ? p.images : null;
          const thumbHtml = extraImgs ? `
            <div class="thumb-strip" id="thumbs-${i}">
              ${extraImgs.map((img, j) => `
                <div class="thumb-item ${j===0?'active':''}" onclick="setMainImg(${i},'${img}',this)">
                  <img src="${img}" loading="lazy" alt="">
                </div>`).join('')}
            </div>` : '';
          track.innerHTML += `
            <div class="carousel-slide">
              <div class="product-card-large">
                <img id="main-img-${i}" src="${p.image}" alt="${p.name.replace(/\n/g,' ')}">
                ${thumbHtml}
                <div class="product-info-large">
                  <div class="product-name-large">${p.name.replace(/\n/g,'<br>')}</div>
                  <div class="product-desc">${p.desc || ''}</div>
                </div>
              </div>
            </div>`;
          dots.innerHTML += `<div class="dot ${i===0?'active':''}" onclick="goToSlide(${i})"></div>`;
        });
      }

      updateCarousel();
      enableDragScroll();
    }

    // ===== Open detail from tile =====
    function openDetail(index) {
      currentSlide = index;
      setView('carousel');
      updateCarousel();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ===== Switch main image in detail =====
    function setMainImg(slideIndex, imgUrl, thumbEl) {
      const mainImg = document.getElementById(`main-img-${slideIndex}`);
      if (mainImg) mainImg.src = imgUrl;
      const strip = document.getElementById(`thumbs-${slideIndex}`);
      if (strip) strip.querySelectorAll('.thumb-item').forEach(t => t.classList.remove('active'));
      if (thumbEl) thumbEl.classList.add('active');
    }

    // ===== View toggle =====
    function setView(mode) {
      document.getElementById('tile-view').style.display     = mode === 'tile'     ? 'block' : 'none';
      document.getElementById('carousel-view').style.display = mode === 'carousel' ? 'block' : 'none';
      document.getElementById('btn-tile').classList.toggle('active',     mode === 'tile');
      document.getElementById('btn-carousel').classList.toggle('active', mode === 'carousel');
    }

    // ===== Carousel logic =====
    function updateCarousel() {
      const products = EVENTS[currentEventKey].products;
      document.getElementById('carousel-track').style.transform = `translateX(-${currentSlide * 100}%)`;
      document.getElementById('carousel-counter').textContent =
        products.length > 0 ? `${currentSlide + 1} / ${products.length}` : '';
      document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === currentSlide));
    }
    function moveCarousel(dir) {
      const len = EVENTS[currentEventKey].products.length;
      if (len === 0) return;
      currentSlide = (currentSlide + dir + len) % len;
      updateCarousel();
    }
    function goToSlide(i) { currentSlide = i; updateCarousel(); }

    // Swipe
    let touchStartX = 0;
    let touchStartY = 0;
    document.getElementById('carousel-track').addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    document.getElementById('carousel-track').addEventListener('touchend', e => {
      const diffX = touchStartX - e.changedTouches[0].clientX;
      const diffY = touchStartY - e.changedTouches[0].clientY;
      if (Math.abs(diffX) > 50 && Math.abs(diffX) > Math.abs(diffY)) {
        moveCarousel(diffX > 0 ? 1 : -1);
      }
    });

    // ===== Thumb Strip Drag to Scroll (PC) =====
    function enableDragScroll() {
      document.querySelectorAll('.thumb-strip').forEach(strip => {
        // Prevent touch events from bubbling up to carousel-track
        strip.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
        strip.addEventListener('touchmove', e => e.stopPropagation(), { passive: true });
        strip.addEventListener('touchend', e => e.stopPropagation());

        let isDown = false;
        let startX;
        let scrollLeft;
        
        strip.addEventListener('mousedown', (e) => {
          isDown = true;
          strip.style.cursor = 'grabbing';
          startX = e.pageX - strip.offsetLeft;
          scrollLeft = strip.scrollLeft;
        });
        strip.addEventListener('mouseleave', () => {
          isDown = false;
          strip.style.cursor = 'grab';
        });
        strip.addEventListener('mouseup', () => {
          isDown = false;
          strip.style.cursor = 'grab';
        });
        strip.addEventListener('mousemove', (e) => {
          if (!isDown) return;
          e.preventDefault();
          const x = e.pageX - strip.offsetLeft;
          const walk = (x - startX) * 2;
          strip.scrollLeft = scrollLeft - walk;
        });
      });
    }

    // ===== Init =====
    buildTabs();
    buildViews();
  </script>
</body>
</html>
